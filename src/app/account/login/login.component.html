<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="logo-wrapper">
                <img src="assets/logo3.png" alt="UNPHU Logo">
            </div>
            <h1>Citas Médicas</h1>
            <p>Bienvenido, por favor inicia sesión</p>
        </div>

        <form autocomplete="off" [formGroup]="forma" (ngSubmit)="login()">

            <div class="form-group">
                <label class="input-label" for="usuario">Usuario</label>
                <div class="input-wrapper">
                    <input type="text"
                           id="usuario"
                           formControlName="codusuario"
                           [class.is-invalid]="usuarioNoValido"
                           class="input-field"
                           placeholder="Escribe tu usuario">
                    <span class="input-icon fas fa-user"></span>
                </div>
                <div *ngIf="usuarioNoValido" class="error-msg">
                    <i class="fas fa-exclamation-circle"></i> El usuario es requerido
                </div>
            </div>

            <div class="form-group">
                <label class="input-label" for="password">Contraseña</label>
                <div class="input-wrapper">
                    <input type="password"
                           id="password"
                           formControlName="codclave"
                           [class.is-invalid]="claveNoValido"
                           class="input-field"
                           placeholder="••••••••">
                    <span class="input-icon fas fa-lock"></span>
                </div>
                <div *ngIf="claveNoValido" class="error-msg">
                    <i class="fas fa-exclamation-circle"></i> La contraseña es requerida
                </div>
            </div>

            <button type="submit" class="login-button">
                <span>Ingresar al sistema</span>
                <i class="fas fa-arrow-right"></i>
            </button>

            <div class="footer-text">
                &copy; {{ currentYear }} UNPHU - Gestión de Citas
            </div>
        </form>
    </div>
</div>
