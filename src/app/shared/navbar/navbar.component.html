<body class="hold-transition sidebar-mini layout-fixed layout-navbar-fixed layout-footer-fixed">
    <div  class="wrapper">



        <!-- Navbar -->
        <nav class="main-header navbar navbar-expand navbar-white navbar-light">
            <!-- Left navbar links -->
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
                </li>
            </ul>

            <!-- Right navbar links -->
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link text-danger" style="cursor: pointer;" (click)="salir()" title="Salir del Sistema">
                        <i class="fas fa-sign-out-alt"></i> Salir
                    </a>
                </li>
            </ul>
        </nav>
        <!-- /.navbar -->

        <!-- Main Sidebar Container -->
        <aside class="main-sidebar sidebar-dark-primary elevation-4">
            <!-- Brand Logo -->
            <a routerLink="/dashboard/dash" class="brand-link">
                <img src="assets/logo.png" alt="Logo" class="brand-image img-circle elevation-3" style="opacity: .8">
                <span class="brand-text font-weight-light">CitasMed</span>
            </a>

            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Sidebar user panel -->
                <div class="user-panel mt-3 pb-3 mb-3 d-flex align-items-center">
                    <div class="image">
                        <i class="fas fa-user-circle fa-2x text-light"></i>
                    </div>
                    <div class="info">
                        <a class="d-block" style="cursor: default;">{{nombre_usuario}}</a>
                    </div>
                </div>

                <!-- Sidebar Menu -->
                <nav class="mt-2">
                    <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
                        
                        <li class="nav-item">
                            <a routerLink="/dashboard/dash" [ngClass]="isActive('/dashboard/dash') ? 'nav-link active' : 'nav-link'">
                                <i class="nav-icon fas fa-chart-pie"></i>
                                <p>Dashboard</p>
                            </a>
                        </li>

                        <li class="nav-header">PROCESOS</li>

                        <li class="nav-item" *ngFor="let menu of menu_adm_proceso">
                            <a [routerLink]="menu.url" [ngClass]="isActive(menu.url) ? 'nav-link active' : 'nav-link'">
                                <i [ngClass]="menu.icono"></i>
                                <p>{{menu.name}}</p>
                            </a>
                        </li>

                        <li class="nav-header">PARÁMETROS</li>

                        <li class="nav-item" *ngFor="let menu of menu_adm_param">
                            <a [routerLink]="menu.url" [ngClass]="isActive(menu.url) ? 'nav-link active' : 'nav-link'">
                                <i [ngClass]="menu.icono"></i>
                                <p>{{menu.name}}</p>
                            </a>
                        </li>

                        <li class="nav-header">REPORTES</li>

                        <li class="nav-item" *ngFor="let menu of menu_adm_reporte">
                            <a [routerLink]="menu.url" [ngClass]="isActive(menu.url) ? 'nav-link active' : 'nav-link'">
                                <i [ngClass]="menu.icono"></i>
                                <p>{{menu.name}}</p>
                            </a>
                        </li>

                    </ul>
                </nav>
                <!-- /.sidebar-menu -->
            </div>
            <!-- /.sidebar -->
        </aside>

        <!-- Content Wrapper. Contains page content -->
        <div class="content-wrapper">
            <!-- Content Header (Page header) -->



            <router-outlet></router-outlet>

        </div>
        <!-- /.content-wrapper -->

        <!-- Control Sidebar -->
        <aside class="control-sidebar control-sidebar-dark">
            <!-- Control sidebar content goes here -->
        </aside>
        <!-- /.control-sidebar -->

        <!-- Main Footer -->
        <footer class="main-footer">
            <strong> Sistema de Administración</strong>
            <div class="float-right d-none d-sm-inline-block">
                <b>Version</b> 1.0.0
            </div>
        </footer>
    </div>

</body>
