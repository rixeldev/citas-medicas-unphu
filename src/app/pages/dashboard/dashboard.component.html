<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-8">
                <h1>Datos del dia</h1>
            </div>
           
        </div>
    </div>
</section>
<section class="content">
    <div class="container-fluid">
        <!-- Small boxes (Stat box) -->
        <div class="row">
            <div class="col-lg-3 col-6">
                <!-- small box -->
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3>{{monto1}}</h3>

                        <p>Total Factura </p>
                    </div>
                    <div class="icon">
                        <i class="ion ion-bag"></i>
                    </div>
                    <a href="#" class="small-box-footer">...</a>
                </div>
            </div>
            <!-- ./col -->
            <div class="col-lg-3 col-6">
                <!-- small box -->
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3>{{monto2}}</h3>

                        <p>Total de Ingresos</p>
                    </div>
                    <div class="icon">
                        <i class="ion ion-stats-bars"></i>
                    </div>
                    <a href="#" class="small-box-footer">...</a>
                </div>
            </div>
            <!-- ./col -->
            <div class="col-lg-3 col-6">
                <!-- small box -->
                <div class="small-box bg-warning">
                    <div class="inner">
                        <h3>{{monto3}}</h3>

                        <p>Total Egresos</p>
                    </div>
                    <div class="icon">
                        <i class="ion ion-person-add"></i>
                    </div>
                    <a href="#" class="small-box-footer">...</a>
                </div>
            </div>
            <!-- ./col -->
            <div class="col-lg-3 col-6">
                <!-- small box -->
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3>{{monto4}}</h3>

                        <p>Gastos</p>
                    </div>
                    <div class="icon">
                        <i class="ion ion-pie-graph"></i>
                    </div>
                    <a href="#" class="small-box-footer">...</a>
                </div>
            </div>
            <!-- ./col -->
        </div>
        <!-- /.row -->
        <!-- Main row -->

        <!-- /.row (main row) -->
    </div>
    <!-- /.container-fluid -->

    <div class="content">
        <div class="container-fluid">
            <div class="row">
               
                <!-- /.col-md-6 -->
                <div class="col-lg-12">
                    <div class="card">
                        <div class="card-header border-0"  style="background-color: #0069d9;">
                            <h3 style="color: aliceblue;"  class="card-title">Reservaciones</h3>
                            <div class="card-tools">

                            </div>
                        </div>
                        <div class="card-body table-responsive p-0">
                            <table class="table table-striped table-valign-middle">
                                <thead>
                                    <tr>
                                        <th>Id usuario</th>
                                        <th>Nombre</th>
                                        <th>Tipo Usuario</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let item of tblreservacioness">
                                        <td>{{item.idusuario}}</td>
                                        <td>{{item.usuario}}</td>
                                        <td>{{item.tipousuario}}</td>
                                        <td class=" text-left ">

                                                    
            
                                            <a  [tooltip]=" 'Inactivar' "  (click)=" Estadousuario(item, 'N' ) " type=" button "  class=" btn btn-icon btn-danger mr-1 mb-1 waves-effect waves-light "><i
                                                        class=" fa fa-trash " style=" color:white "></i></a>
                                        </td>
                                    </tr>

                                </tbody>
                            </table>
                      
                        </div>
                    </div>
                    <!-- /.card -->


                </div>
                <!-- /.col-md-6 -->
            </div>
            <!-- /.row -->
        </div>
        <!-- /.container-fluid -->
    </div>



</section>
