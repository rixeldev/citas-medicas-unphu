<!-- Content Wrapper. Contains page content -->

<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1>Agregar o editar Usuario</h1>
            </div>
        </div>
    </div>
</section>

<section class="content">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card ">
                    <div class="card-header" style="background-color: #0069d9;">
                        <h3 class="card-title" style="color: aliceblue;" ><br> Datos de la Usuario</h3>
                    </div>
                    <form [formGroup]="forma" (ngSubmit)="guardar()">
                        <div class="card-body">
                           
    
       <div class="form-group">
        <label for="Nombre">Nombre</label>
        <input type="text" name="Nombre" [class.is-invalid]="NombreNoValido" 
        formControlName="Nombre" class="form-control" 
        id="Nombre" placeholder="Nombre de usuario">
        <small *ngIf="NombreNoValido" class="form-text text-danger"><i
                class="fa fa-exclamation-triangle"></i>El campo Nombre es requerido
        </small>
    </div>

       <div class="form-group">
        <label for="usuario">Usuario</label>
        <input type="text" name="usuario" [class.is-invalid]="usuarioNoValido" 
        formControlName="usuario" class="form-control" 
        id="usuario" placeholder="Usuario de usuario">
        <small *ngIf="usuarioNoValido" class="form-text text-danger"><i
                class="fa fa-exclamation-triangle"></i>El campo Usuario es requerido
        </small>
    </div>
       <div class="form-group">
        <label for="clave">Clave</label>
        <input type="password" name="clave" [class.is-invalid]="claveNoValido" 
        formControlName="clave" class="form-control" 
        id="clave" placeholder="Clave de usuario">
        <small *ngIf="claveNoValido" class="form-text text-danger"><i
                class="fa fa-exclamation-triangle"></i>El campo Clave es requerido
        </small>
    </div>
     


    <div class="form-group">
        <label for="direccion">Tipo Usuario</label>
        <select formControlName="tipo_usuario" name="tipo_usuario" id="tipo_usuario" [class.is-invalid]="tipo_usuarioNoValido" class="form-control">
            <option value="ADM" selected>Administrador</option>
            <option value="USR">Usuario</option>
        </select>
        <small *ngIf="tipo_usuarioNoValido" class="form-text text-danger"><i
                class="fa fa-exclamation-triangle"></i>El campo tipo_usuario es requerido
        </small>
    </div>

    
                            <div class="form-group">
                                <label for="direccion">Estado</label>
                                <select formControlName="estado" name="estado" id="estado" [class.is-invalid]="estadoNoValido" class="form-control">
                                    <option value="A" selected>Activo</option>
                                    <option value="I">Inactivo</option>
                                </select>
                                <small *ngIf="estadoNoValido" class="form-text text-danger"><i
                                        class="fa fa-exclamation-triangle"></i>El campo estado es requerido
                                </small>
                            </div>

                        </div>
                        <div class="card-footer">
                            <div class="col">

                                <button routerLink="/dashboard/usuario" class="btn btn-secondary mr-1 mb-1 waves-effect waves-light">
                                    <i class="fa fa-window-close"></i>
                                    Cancelar
                                </button>

                                <button type="submit" class="btn btn-info mr-1 mb-1 waves-effect waves-light">
                                    <i class="fa fa-save"></i>
                                    Guardar
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</section>
